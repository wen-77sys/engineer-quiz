<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>工程師職涯測驗</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="google-site-verification" content="google85207e0cc7cca3dc" />

<style>
body{font-family:Arial;max-width:900px;margin:auto;padding:20px;background:#f5f7fa;}
h1{text-align:center;}

.question{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}

button{
    padding:12px 20px;
    background:#2a5298;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.warning{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🔧 工程師職涯測驗</h1>

<div id="quiz"></div>

<button onclick="showResult()">查看結果</button>
<div id="msg" class="warning"></div>

<script>

// ===== 每題不同情境 + 不同選項 =====
const questions = [
{
q:"產品數據異常時，你會怎麼做？",
a:[
["先分析數據找根因","QE"],
["檢查製程流程","PE"],
["想重新設計產品","RD"],
["去現場檢查機台","EE"]
]
},
{
q:"生產效率下降時你會？",
a:[
["分析數據找問題","QE"],
["調整流程改善效率","PE"],
["重新設計方法","RD"],
["去調整設備","EE"]
]
},
{
q:"設計新產品時你會注意？",
a:[
["數據與品質穩定性","QE"],
["製程可行性","PE"],
["創新功能","RD"],
["設備相容性","EE"]
]
},
{
q:"設備突然故障你會？",
a:[
["分析故障原因","QE"],
["檢查流程問題","PE"],
["想替代設計","RD"],
["立刻修設備","EE"]
]
},
{
q:"同事出錯時你會？",
a:[
["分析原因","QE"],
["優化流程","PE"],
["提出新想法","RD"],
["直接幫忙處理","EE"]
]
}
];

// ===== 動態生成 =====
let html="";

for(let i=0;i<questions.length;i++){
html+=`
<div class="question">
<p>${i+1}. ${questions[i].q}</p>
`;

questions[i].a.forEach(opt=>{
html+=`
<label>
<input type="radio" name="q${i+1}" value="${opt[1]}">
${opt[0]}
</label><br>
`;
});

html+=`</div>`;
}

document.getElementById("quiz").innerHTML=html;

// ===== 計分 + 防呆 =====
function showResult(){

let score={QE:0,PE:0,RD:0,EE:0};

for(let i=1;i<=questions.length;i++){
let ans=document.querySelector('input[name="q'+i+'"]:checked');

if(!ans){
document.getElementById("msg").innerText="⚠️ 請完成所有題目";
return;
}

score[ans.value]++;
}

let result=Object.keys(score).reduce((a,b)=>score[a]>score[b]?a:b);

if(result==="QE") location.href="qe.html";
if(result==="PE") location.href="pe.html";
if(result==="RD") location.href="rd.html";
if(result==="EE") location.href="ee.html";
}

</script>

</body>
</html>
