<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>工程師職涯測驗</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="google-site-verification" content="google85207e0cc7cca3dc" />

<style>
body{font-family:Arial;max-width:900px;margin:auto;padding:20px;background:#f5f7fa;}
h1{text-align:center;}

.question{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}

button{
    padding:12px 20px;
    background:#2a5298;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.warning{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🔧 工程師職涯測驗</h1>

<div id="quiz"></div>

<button onclick="showResult()">查看結果</button>
<div id="msg" class="warning"></div>

<script>

// ===== 每題不同情境 + 不同選項 =====
const questions = [
{
q:"產品數據異常時，你會怎麼做？",
a:[
["先分析數據找根因","QE"],
["檢查製程流程","PE"],
["思考是否有新設計方式","RD"],
["去現場確認設備狀況","EE"]
]
},
{
q:"生產效率下降時你會？",
a:[
["分析數據找趨勢","QE"],
["調整流程改善效率","PE"],
["重新設計方法","RD"],
["檢查機台運作","EE"]
]
},
{
q:"設計新產品時你最關心？",
a:[
["品質穩定性","QE"],
["製程可行性","PE"],
["創新功能","RD"],
["設備支援能力","EE"]
]
},
{
q:"設備突然故障你會？",
a:[
["分析故障原因","QE"],
["檢查流程問題","PE"],
["思考替代設計","RD"],
["直接修設備","EE"]
]
},
{
q:"同事出錯時你會？",
a:[
["分析原因","QE"],
["優化流程","PE"],
["提供新想法","RD"],
["直接幫忙處理","EE"]
]
},

// ===== 擴充題 =====

{
q:"資料結果與預期不同，你會？",
a:[
["回頭檢查數據","QE"],
["檢查流程步驟","PE"],
["懷疑設計方法","RD"],
["去現場確認","EE"]
]
},
{
q:"工作中你最常做的事情是？",
a:[
["分析報表","QE"],
["改善流程","PE"],
["發想新方法","RD"],
["操作設備","EE"]
]
},
{
q:"遇到複雜問題你會？",
a:[
["拆解數據分析","QE"],
["分段優化流程","PE"],
["重新設計方案","RD"],
["直接動手試","EE"]
]
},
{
q:"你學習新技能偏好？",
a:[
["理解原理","QE"],
["學流程系統","PE"],
["學創新方法","RD"],
["實際操作","EE"]
]
},
{
q:"壓力來時你通常？",
a:[
["分析問題來源","QE"],
["改善流程避免再發","PE"],
["重新思考方法","RD"],
["先處理現場問題","EE"]
]
},
{
q:"你覺得最重要的是？",
a:[
["準確性","QE"],
["效率","PE"],
["創新","RD"],
["穩定現場","EE"]
]
},
{
q:"你偏好的工作內容？",
a:[
["數據分析","QE"],
["流程改善","PE"],
["產品設計","RD"],
["設備維護","EE"]
]
},
{
q:"你比較擅長？",
a:[
["邏輯分析","QE"],
["流程管理","PE"],
["創意思考","RD"],
["實作能力","EE"]
]
},
{
q:"當問題反覆出現你會？",
a:[
["找根本原因","QE"],
["優化流程","PE"],
["重新設計","RD"],
["直接處理","EE"]
]
},
{
q:"你理想的工作是？",
a:[
["分析型工作","QE"],
["流程型工作","PE"],
["創新型工作","RD"],
["現場型工作","EE"]
]
},
{
q:"面對緊急狀況你會？",
a:[
["找原因","QE"],
["控流程","PE"],
["想新方法","RD"],
["直接處理","EE"]
]
},
{
q:"你對錯誤的態度是？",
a:[
["追根究底","QE"],
["避免再發","PE"],
["重新設計","RD"],
["立即修正","EE"]
]
},
{
q:"你最有成就感的是？",
a:[
["找到問題原因","QE"],
["改善流程","PE"],
["做出創新","RD"],
["修好設備","EE"]
]
},
{
q:"你覺得自己像哪種人？",
a:[
["分析型","QE"],
["系統型","PE"],
["創造型","RD"],
["實作型","EE"]
]
}
];

// ===== 動態生成 =====
let html="";

for(let i=0;i<questions.length;i++){
html+=`
<div class="question">
<p>${i+1}. ${questions[i].q}</p>
`;

questions[i].a.forEach(opt=>{
html+=`
<label>
<input type="radio" name="q${i+1}" value="${opt[1]}">
${opt[0]}
</label><br>
`;
});

html+=`</div>`;
}

document.getElementById("quiz").innerHTML=html;

// ===== 計分 + 防呆 =====
function showResult(){

let score={QE:0,PE:0,RD:0,EE:0};

for(let i=1;i<=questions.length;i++){
let ans=document.querySelector('input[name="q'+i+'"]:checked');

if(!ans){
document.getElementById("msg").innerText="⚠️ 請完成所有題目";
return;
}

score[ans.value]++;
}

let result=Object.keys(score).reduce((a,b)=>score[a]>score[b]?a:b);

if(result==="QE") location.href="qe.html";
if(result==="PE") location.href="pe.html";
if(result==="RD") location.href="rd.html";
if(result==="EE") location.href="ee.html";
}

</script>

</body>
</html>
