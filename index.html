<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>工程師職涯測驗｜QE / PE / RD / EE</title>

<meta name="description" content="免費工程師職涯測驗，測出你適合QE、PE、RD、EE工程師類型">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="google-site-verification" content="google85207e0cc7cca3dc" />

<style>
body{
    font-family:Arial;
    max-width:900px;
    margin:auto;
    padding:20px;
    background:#f5f7fa;
}

h1{text-align:center;}

.box{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.question{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}

button{
    padding:12px 20px;
    background:#2a5298;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

a{
    display:block;
    margin:8px 0;
    padding:10px;
    background:#2a5298;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
a:hover{background:#1e3c72;}
</style>
</head>

<body>

<h1>🔧 工程師職涯測驗</h1>

<div class="box">
<p>3分鐘測出你適合 QE / PE / RD / EE 工程師類型</p>
</div>

<!-- 測驗 -->
<div id="quiz"></div>

<button onclick="showResult()">查看結果</button>

<!-- 入口（SEO用） -->
<div class="box">
<h3>工程師職涯分類</h3>

<a href="qe.html">📊 QE 品質工程師</a>
<a href="pe.html">🏭 PE 製程工程師</a>
<a href="rd.html">🚀 RD 研發工程師</a>
<a href="ee.html">⚙️ EE 設備工程師</a>
</div>

<script>

// ===== 真正有邏輯的20題 =====
const questions = [
"看到產品有異常，你會？",
"你比較喜歡的工作？",
"發現問題時第一步？",
"你偏好工作型態？",
"成就感來源？",
"你比較擅長？",
"你喜歡處理？",
"同事求助你會？",
"你學習方式？",
"理想工作？",
"設備故障時你會？",
"做事習慣？",
"你偏好任務？",
"錯誤發生時？",
"你比較像？",
"你喜歡解決？",
"你偏好節奏？",
"你工作風格？",
"壓力來時？",
"職涯目標？"
];

let html="";

for(let i=0;i<20;i++){
html+=`
<div class="question">
<p>${i+1}. ${questions[i]}</p>

<label><input type="radio" name="q${i+1}" value="QE">找原因 / 分析數據</label><br>
<label><input type="radio" name="q${i+1}" value="PE">改善流程 / 提升效率</label><br>
<label><input type="radio" name="q${i+1}" value="RD">創新設計 / 想方法</label><br>
<label><input type="radio" name="q${i+1}" value="EE">動手處理 / 修設備</label>
</div>
`;
}

document.getElementById("quiz").innerHTML=html;

// ===== 計分 + 導向 =====
function showResult(){

let score={QE:0,PE:0,RD:0,EE:0};

for(let i=1;i<=20;i++){
let ans=document.querySelector('input[name="q'+i+'"]:checked');
if(ans) score[ans.value]++;
}

let result=Object.keys(score).reduce((a,b)=>score[a]>score[b]?a:b);

// 導向結果頁
if(result==="QE") location.href="qe.html";
if(result==="PE") location.href="pe.html";
if(result==="RD") location.href="rd.html";
if(result==="EE") location.href="ee.html";

}

</script>

</body>
</html>
